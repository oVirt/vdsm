name: Containers
on:
  # Be able to run the job manually when needed
  # (Actions -> Containers -> Run workflow)
  workflow_dispatch:
  # Build every week on Sunday 00:00
  schedule:
    - cron:  '0 0 * * 0'
env:
  IMAGE_REGISTRY: quay.io
  can_push: ${{ github.repository_owner == 'oVirt' }}
jobs:
  container-network:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container: [ functional, integration, unit ]
    steps:
      - uses: ovirt/checkout-action@main
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install podman
      - name: Build container images
        working-directory: docker/network
        run: make ${{ matrix.container }}
      - name: Push to Quay.io
        if: ${{ env.can_push == 'true' }}
        id: push-to-quay
        env:
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ovirt/vdsm-network-tests-${{ matrix.container }}
          USERNAME: ${{ secrets.QUAY_USERNAME  }}
          PASSWORD: ${{ secrets.QUAY_TOKEN }}
        run: |
          podman push "${IMAGE_NAME}:alma-9" "${REGISTRY}/${IMAGE_NAME}:alma-9" --tls-verify=true --creds="${USERNAME}:${PASSWORD}"
          podman push "${IMAGE_NAME}:alma-10" "${REGISTRY}/${IMAGE_NAME}:alma-10" --tls-verify=true --creds="${USERNAME}:${PASSWORD}"
          podman push "${IMAGE_NAME}:centos-9" "${REGISTRY}/${IMAGE_NAME}:centos-9" --tls-verify=true --creds="${USERNAME}:${PASSWORD}"
          podman push "${IMAGE_NAME}:centos-10" "${REGISTRY}/${IMAGE_NAME}:centos-10" --tls-verify=true --creds="${USERNAME}:${PASSWORD}"
  container-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [ centos-9, centos-10, alma-9, alma-10 ]
    steps:
      - uses: ovirt/checkout-action@main
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install podman
      - name: Build container images
        working-directory: docker
        run: make ${{ matrix.distro }}
      - name: Push to Quay.io
        if: ${{ env.can_push == 'true' }}
        id: push-to-quay
        env:
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ovirt/vdsm-test
          NAME: ${{ matrix.distro }}
          USERNAME: ${{ secrets.QUAY_USERNAME  }}
          PASSWORD: ${{ secrets.QUAY_TOKEN }}
        run: |
          podman push "${IMAGE_NAME}:${NAME}" "${REGISTRY}/${IMAGE_NAME}:${NAME}" --tls-verify=true --creds="${USERNAME}:${PASSWORD}"
